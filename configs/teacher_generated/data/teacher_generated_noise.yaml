dataset:
  name: Teacher_Generated_Noise
  # If this path does not exist, must generate new data
  # To generate new data, delete the teacher model stored at this path or specify a new path
  generating_teacher_model_path: models/teacher/teacher_generating.pth
  noise_percent: 0.1
  networks:
    type: TwoLayer
    params:
      m_type: 'twolayerbinary'
  # Synthetic dataset; no root needed
  n_samples: 10000
  test_size: 0.2
  num_classes: 2
  input_dim: [1,16]
  hidden_dim: 15
  output_dim: 1
  tau: 3